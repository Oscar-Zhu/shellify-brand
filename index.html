<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shellify | Minimal Protection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Shellify is a premium phone case brand focused on minimalist design and everyday protection.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #050505;
      color: #eaeaea;
    }

    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: radial-gradient(
          circle at 50% 40%,
          rgba(120, 200, 255, 0.08),
          transparent 45%
        ),
        linear-gradient(to bottom, #000, #060606);
    }

    h1 {
      font-size: 64px;
      font-weight: 400;
      letter-spacing: 6px;
      margin-bottom: 20px;
    }

    .tagline {
      font-size: 16px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.85;
      margin-bottom: 14px;
    }

    .sub {
      font-size: 14px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<section class="hero">
  <div class="hero-content">

    <div class="logo-mark">
      <img src="logo.svg" alt="Shellify logo">
    </div>

    <h1>Shellify</h1>
    <p class="tagline">Minimal Protection for Modern Devices</p>
    <p class="sub">Designed in Australia. Built for Everyday Precision.</p>

  </div>
</section>

</body>
</html>
